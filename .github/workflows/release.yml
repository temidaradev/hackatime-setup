name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-aarch64
          - target: x86_64-pc-windows-msvc
            os: blacksmith-4vcpu-windows-2025
            name: windows-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install musl tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          curl -fsSL https://cdn.mahadk.com/s/v3/c438074c170f3f65_aarch64-linux-musl-cross.tgz | tar xz -C /opt
          echo "/opt/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        if: matrix.target != 'aarch64-unknown-linux-musl'

      - name: Build (Linux ARM MUSL)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-musl-gcc
          CC_aarch64_unknown_linux_musl: aarch64-linux-musl-gcc
          AR_aarch64_unknown_linux_musl: aarch64-linux-musl-ar

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../hackatime_setup-${{ matrix.name }}.tar.gz hackatime_setup
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Move-Item -Force hackatime_setup.exe hackatime_cli.exe
          7z a ../../../hackatime_setup-${{ matrix.name }}.zip hackatime_cli.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hackatime_setup-${{ matrix.name }}
          path: hackatime_setup-${{ matrix.name }}.*

  release:
    needs: build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
